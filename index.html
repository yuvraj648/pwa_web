<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PWA Website</title>

  <!-- IMPORTANT: change username + repo -->
  <link rel="canonical" href="https://yuvraj648.github.io/pwa_web/" />
  <link rel="manifest" href="/pwa_web/manifest.webmanifest">
  <link rel="stylesheet" href="css/styles.css">
</head>

<body>
  <h1>PWA hosted on GitHub Pages</h1>

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register(
        '/pwa_web/sw.js',
        { scope: '/pwa_web/' }
      );
    }
  </script>

  <script src="js/app.js"></script>
</body>
</html>
