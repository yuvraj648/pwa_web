<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>PWA Website</title>

  <!-- Canonical URL -->
  <link rel="canonical" href="https://yuvraj648.github.io/pwa_web/" />

  <!-- PWA Manifest -->
  <link rel="manifest" href="/pwa_web/manifest.webmanifest" />

  <!-- CSS -->
  <link rel="stylesheet" href="/pwa_web/css/styles.css" />

  <!-- Theme color for mobile -->
  <meta name="theme-color" content="#0d6efd">
</head>

<body>

  <!-- Header -->
  <header>
    🚀 PWA hosted on GitHub Pages
  </header>

  <!-- Main Content -->
  <div class="container">

    <div class="card">
      <h2>Welcome 👋</h2>
      <p>
        This is a <b>Progressive Web App</b> deployed using
        <b>GitHub Pages</b>.
      </p>
      <button id="installBtn" hidden>Install App</button>
    </div>

    <div class="card">
      <h3>Features ✨</h3>
      <p>✔ Installable</p>
      <p>✔ Offline Support</p>
      <p>✔ Fast & Secure</p>
    </div>

  </div>

  <!-- Service Worker -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/pwa_web/sw.js', {
          scope: '/pwa_web/'
        })
        .then(() => console.log('Service Worker Registered'))
        .catch(err => console.error('SW registration failed:', err));
      });
    }
  </script>

  <!-- Install Button Logic -->
  <script>
    let deferredPrompt;
    const installBtn = document.getElementById('installBtn');

    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      installBtn.hidden = false;

      installBtn.addEventListener('click', () => {
        installBtn.hidden = true;
        deferredPrompt.prompt();
        deferredPrompt.userChoice.then(() => {
          deferredPrompt = null;
        });
      });
    });
  </script>

  <!-- App JS -->
  <script src="/pwa_web/js/app.js"></script>

</body>
</html>
